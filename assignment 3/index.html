<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Timer</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="">Timer</a>
      </nav>
    </header>
    <main>
      <div class="countdown">
        <p id="timer" class="normal">
          <span class="numberBlock">01</span>:<span class="numberBlock">00</span
          >:<span class="numberBlock">00</span>
        </p>
        <div>
          <button id="start-button" class="start">Start</button>
          <button id="pause-button" class="pause" disabled="true">Pause</button>
          <button id="stop-button" class="stop" disabled="true">Stop</button>
        </div>
      </div>
    </main>
    <footer></footer>
    <script src="script.js"></script>
  </body>
</html>
